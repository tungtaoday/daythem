# Alembic configuration for DayThem backend.
#
# NOTE: sqlalchemy.url is intentionally NOT set here. The database URL is read
# at runtime from daythem.config.settings.DATABASE_URL inside migrations/env.py,
# so a single config works across dev (sqlite) and prod (postgres) without edits.

[alembic]
# Path to migration scripts, relative to this file.
script_location = migrations

# Template used to generate migration file names.
# file_template = %%(rev)s_%%(slug)s

# Timezone for timestamps in migration files (blank = local time).
# timezone =

# Max length of characters to apply to the "slug" field.
# truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command,
# regardless of autogenerate.
# revision_environment = false

# Version path separator; "os" uses os.pathsep.
version_path_separator = os

# sqlalchemy.url is supplied dynamically in env.py — do not hardcode it here.

[post_write_hooks]
# Optional formatting hooks for generated migrations (disabled by default).

# Logging configuration.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
